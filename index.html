<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="党史题库">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#C41E3A">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><rect width='180' height='180' rx='36' fill='%23C41E3A'/><text x='90' y='115' text-anchor='middle' font-size='90' fill='white'>党</text></svg>">
<link rel="manifest" href="manifest.json">
<title>党史学习题库</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --red: #C41E3A;
  --red-light: #E8344F;
  --gold: #D4A843;
  --bg: #F2F2F7;
  --card: #FFFFFF;
  --text: #1C1C1E;
  --text2: #636366;
  --text3: #AEAEB2;
  --sep: #E5E5EA;
  --green: #34C759;
  --blue: #007AFF;
  --orange: #FF9500;
  --radius: 14px;
  --safe-b: env(safe-area-inset-bottom, 20px);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
/* Header */
.header {
  background: var(--red);
  color: white;
  padding: 16px 20px;
  padding-top: max(16px, env(safe-area-inset-top));
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(196,30,58,.3);
}
.header h1 { font-size:18px; font-weight:600; letter-spacing:.5px; }
.header .sub { font-size:12px; opacity:.8; margin-top:2px; }
/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  background: var(--card);
  margin: 16px 16px 0;
  border-radius: var(--radius);
  overflow: hidden;
}
.tab {
  flex:1;
  text-align: center;
  padding: 12px 8px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text2);
  cursor: pointer;
  transition: all .2s;
  border-bottom: 2px solid transparent;
}
.tab.active {
  color: var(--red);
  border-bottom-color: var(--red);
  font-weight: 600;
}
/* Stats */
.stats {
  display: flex;
  gap: 10px;
  margin: 12px 16px 0;
}
.stat {
  flex:1;
  background: var(--card);
  border-radius: var(--radius);
  padding: 14px 12px;
  text-align: center;
}
.stat .val { font-size: 24px; font-weight: 700; color: var(--red); }
.stat .lbl { font-size: 11px; color: var(--text2); margin-top: 4px; }
.stat.done .val { color: var(--green); }
/* Page */
.page { display:none; }
.page.active { display:block; }
/* List */
.list { margin: 12px 16px; display:flex; flex-direction:column; gap:8px; }
.q-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  cursor: pointer;
  transition: transform .15s;
  border-left: 4px solid transparent;
  position: relative;
}
.q-card:active { transform: scale(.98); }
.q-card.done { border-left-color: var(--green); }
.q-card.wrong { border-left-color: var(--orange); }
.q-card .q-num { font-size: 12px; color: var(--text3); font-weight: 500; }
.q-card .q-type {
  display: inline-block;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 6px;
  font-weight: 500;
}
.q-card .q-type.single { background: #E8F5E9; color: #2E7D32; }
.q-card .q-type.multiple { background: #FFF3E0; color: #E65100; }
.q-card .q-type.truefalse { background: #E3F2FD; color: #1565C0; }
.q-card .q-text { font-size: 15px; margin-top: 8px; line-height: 1.5; }
.q-card .q-badge {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 20px;
}
.q-card.done .q-badge { color: var(--green); }
.q-card.wrong .q-badge { color: var(--orange); }
/* Quiz mode */
.quiz-container { margin: 0 16px; }
.quiz-progress {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 16px 0;
}
.progress-bar {
  flex: 1;
  height: 6px;
  background: var(--sep);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--red);
  border-radius: 3px;
  transition: width .3s;
}
.progress-text { font-size:13px; color: var(--text2); white-space:nowrap; min-width:55px; text-align:right; }
.quiz-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
}
.quiz-type {
  display: inline-block;
  font-size: 12px;
  padding: 3px 8px;
  border-radius: 4px;
  margin-bottom: 12px;
  font-weight: 600;
}
.quiz-type.single { background: #E8F5E9; color: #2E7D32; }
.quiz-type.multiple { background: #FFF3E0; color: #E65100; }
.quiz-type.truefalse { background: #E3F2FD; color: #1565C0; }
.quiz-question {
  font-size: 17px;
  line-height: 1.6;
  margin-bottom: 20px;
  font-weight: 500;
}
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-option {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px 16px;
  border: 2px solid var(--sep);
  border-radius: 12px;
  cursor: pointer;
  transition: all .2s;
  font-size: 15px;
  line-height: 1.4;
}
.quiz-option:active { transform: scale(.98); }
.quiz-option.selected { border-color: var(--blue); background: #EBF5FF; }
.quiz-option.correct { border-color: var(--green); background: #E8F8ED; }
.quiz-option.wrong { border-color: var(--orange); background: #FFF0E5; }
.quiz-option .opt-label {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 14px;
  flex-shrink: 0;
  color: var(--text2);
}
.quiz-option.selected .opt-label { background: var(--blue); color: white; }
.quiz-option.correct .opt-label { background: var(--green); color: white; }
.quiz-option.wrong .opt-label { background: var(--orange); color: white; }
.quiz-nav {
  display: flex;
  gap: 12px;
  margin-top: 16px;
}
.btn {
  flex:1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  font-family: inherit;
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity:.4; pointer-events:none; }
.btn-submit { background: var(--red); color: white; }
.btn-next { background: var(--blue); color: white; }
.btn-outline { background: var(--card); color: var(--red); border: 2px solid var(--red); }
.btn-back { background: var(--bg); color: var(--text); }
/* Result banner */
.result-banner {
  padding: 14px 16px;
  border-radius: 12px;
  margin-top: 12px;
  font-size: 14px;
  line-height: 1.5;
  display: none;
}
.result-banner.correct { background: #E8F8ED; color: #1B5E20; display:block; }
.result-banner.wrong { background: #FFF0E5; color: #BF360C; display:block; }
.result-banner .explain { font-size: 13px; color: var(--text2); margin-top: 8px; }
/* Review */
.review-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 8px;
}
.review-item .r-status {
  font-size: 18px;
  margin-right: 8px;
}
/* Modal */
.modal-overlay {
  position: fixed;
  inset:0;
  background: rgba(0,0,0,.4);
  z-index: 200;
  display: none;
  align-items: flex-end;
  justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 20px;
  padding-bottom: calc(20px + var(--safe-b));
  animation: slideUp .3s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal h3 { font-size: 18px; margin-bottom: 16px; text-align: center; }
.modal-close {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--sep);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 16px;
  font-family: inherit;
}
/* Start screen */
.start-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 24px;
  margin: 16px;
  text-align: center;
}
.start-card .icon {
  font-size: 56px;
  margin-bottom: 12px;
}
.start-card h2 { font-size: 22px; margin-bottom: 8px; }
.start-card p { font-size: 14px; color: var(--text2); line-height: 1.5; margin-bottom: 20px; }
.start-card .btn { width: 100%; max-width: 280px; }
/* Filter chips */
.chips { display:flex; gap:8px; flex-wrap:wrap; margin:12px 16px 0; }
.chip {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  background: var(--card);
  color: var(--text2);
  border: 1px solid var(--sep);
  transition: all .2s;
}
.chip.active { background: var(--red); color: white; border-color: var(--red); }
/* Completion */
.completion {
  text-align: center;
  padding: 40px 20px;
}
.completion .big-emoji { font-size: 64px; }
.completion h2 { font-size: 22px; margin: 16px 0 8px; }
.completion .score { font-size: 48px; font-weight: 700; color: var(--red); }
.completion .detail { font-size: 14px; color: var(--text2); margin: 12px 0 20px; }
</style>
</head>
<body>

<div class="header">
  <h1>党史学习题库</h1>
  <div class="sub">实习考核题库 · 105题 · 党史+律师综合</div>
</div>

<div class="tabs">
  <div class="tab active" data-page="learn">📚 题库</div>
  <div class="tab" data-page="quiz">✏️ 答题</div>
  <div class="tab" data-page="review">📊 回顾</div>
</div>

<!-- Learn Page -->
<div class="page active" id="page-learn">
  <div class="stats">
    <div class="stat">
      <div class="val" id="total-count">0</div>
      <div class="lbl">总题数</div>
    </div>
    <div class="stat done">
      <div class="val" id="done-count">0</div>
      <div class="lbl">已完成</div>
    </div>
    <div class="stat">
      <div class="val" id="rate-display">0%</div>
      <div class="lbl">正确率</div>
    </div>
  </div>
  <div style="margin:8px 16px 0;">
    <input type="search" id="search-input" placeholder="搜索题目..." oninput="renderLearn()"
      style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--sep);font-size:14px;font-family:inherit;background:var(--card);color:var(--text);-webkit-appearance:none;">
  </div>
  <div class="chips" id="filter-chips">
    <span class="chip active" data-filter="all">全部</span>
    <span class="chip" data-filter="single">单选题</span>
    <span class="chip" data-filter="multiple">多选题</span>
    <span class="chip" data-filter="truefalse">判断题</span>
    <span class="chip" data-filter="done">已完成</span>
    <span class="chip" data-filter="undone">未完成</span>
  </div>
  <div class="list" id="question-list"></div>
</div>

<!-- Quiz Page -->
<div class="page" id="page-quiz">
  <div class="start-card" id="quiz-start">
    <div class="icon">🏛️</div>
    <h2>党史知识答题</h2>
    <p>题库共包含单选题、多选题和判断题，涵盖中国共产党历史、习近平法治思想、律师法、律师执业规范等内容。共105题。</p>
    <div style="display:flex;gap:12px;flex-direction:column;align-items:center;">
      <button class="btn btn-submit" onclick="startQuiz('all')" style="max-width:280px;">开始随机练习</button>
      <button class="btn btn-outline" onclick="startQuiz('wrong')" style="max-width:280px;">仅练习错题</button>
      <button class="btn btn-outline" onclick="startQuiz('undone')" style="max-width:280px;">仅练习未答题</button>
    </div>
  </div>
  <div class="quiz-container" id="quiz-active" style="display:none;">
    <div class="quiz-progress">
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-text" id="progress-text">1/78</div>
    </div>
    <div class="quiz-card">
      <span class="quiz-type" id="quiz-type-label"></span>
      <div class="quiz-question" id="quiz-question"></div>
      <div class="quiz-options" id="quiz-options"></div>
      <div class="result-banner" id="result-banner">
        <div id="result-text"></div>
        <div class="explain" id="result-explain"></div>
      </div>
    </div>
    <div class="quiz-nav">
      <button class="btn btn-outline" id="btn-prev" onclick="prevQuestion()" style="max-width:80px;">上一题</button>
      <button class="btn btn-submit" id="btn-action" onclick="submitAnswer()">提交答案</button>
      <button class="btn btn-next" id="btn-next" onclick="nextQuestion()" style="display:none;">下一题</button>
    </div>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn btn-back" onclick="endQuiz()" style="max-width:120px;">结束答题</button>
    </div>
  </div>
  <div class="completion" id="quiz-complete" style="display:none;">
    <div class="big-emoji">🎉</div>
    <h2>答题完成!</h2>
    <div class="score" id="completion-score">0%</div>
    <div class="detail" id="completion-detail"></div>
    <button class="btn btn-submit" onclick="resetQuiz()" style="max-width:200px;">再来一轮</button>
    <button class="btn btn-outline" onclick="showPage('learn')" style="max-width:200px;margin-top:8px;">返回题库</button>
  </div>
</div>

<!-- Review Page -->
<div class="page" id="page-review">
  <div class="stats">
    <div class="stat done"><div class="val" id="review-correct">0</div><div class="lbl">答对</div></div>
    <div class="stat"><div class="val" id="review-wrong">0</div><div class="lbl">答错</div></div>
    <div class="stat"><div class="val" id="review-undone">0</div><div class="lbl">未答</div></div>
  </div>
  <div class="list" id="review-list"></div>
  <div style="text-align:center;padding:16px;">
    <button class="btn btn-outline" onclick="resetAllProgress()" style="max-width:200px;">重置所有进度</button>
  </div>
</div>

<script>

证处罚的，该所自分所受到处罚之日起__内不得申请设立分所。", "options": [{"label": "A", "text": "一年"}, {"label": "B", "text": "二年"}, {"label": "C", "text": "三年"}, {"label": "D", "text": "四年"}], "answer": "B", "source": "《律师事务所管理办法》第三十三条第二款", "explanation": "根据《律师事务所管理办法》第三十三条第二款之规定，律师事务所的分所受到吊销执业许可证处罚的，该所自分所受到处罚之日起二年内不得申请设立分所。"}];

// ===== STATE =====
let progress = JSON.parse(localStorage.getItem('phq_progress') || '{}');
let currentFilter = 'all';
let quizMode = null; // 'all' | 'wrong' | 'undone'
let quizQuestions = [];
let quizIndex = 0;
let quizSubmitted = false;
let quizSelected = new Set();
let quizScore = 0;
let quizLabelMap = {};    // display label → original label
let quizRevLabelMap = {}; // original label → display label

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function saveProgress() {
  localStorage.setItem('phq_progress', JSON.stringify(progress));
}

function getStatus(qid) {
  return progress[qid] || null; // 'correct' | 'wrong' | null
}

function setStatus(qid, status) {
  progress[qid] = status;
  saveProgress();
}

// ===== NAVIGATION =====
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-page="${name}"]`).classList.add('active');
  if (name === 'learn') renderLearn();
  if (name === 'review') renderReview();
  if (name === 'quiz') resetQuiz();
}

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => showPage(tab.dataset.page));
});

// ===== FILTER CHIPS =====
document.getElementById('filter-chips').addEventListener('click', e => {
  if (!e.target.classList.contains('chip')) return;
  document.querySelectorAll('#filter-chips .chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.filter;
  renderLearn();
});

// ===== LEARN PAGE =====
function renderLearn() {
  let filtered = QUESTIONS.slice();
  const search = (document.getElementById('search-input')?.value || '').trim().toLowerCase();
  if (search) {
    filtered = filtered.filter(q =>
      q.question.toLowerCase().includes(search) ||
      q.options.some(o => (o.text || '').toLowerCase().includes(search)) ||
      (q.source || '').toLowerCase().includes(search)
    );
  }
  if (currentFilter === 'single') filtered = filtered.filter(q => q.type === 'single');
  if (currentFilter === 'multiple') filtered = filtered.filter(q => q.type === 'multiple');
  if (currentFilter === 'truefalse') filtered = filtered.filter(q => q.type === 'truefalse');
  if (currentFilter === 'done') filtered = filtered.filter(q => getStatus(q.id));
  if (currentFilter === 'undone') filtered = filtered.filter(q => !getStatus(q.id));

  const list = document.getElementById('question-list');
  list.innerHTML = filtered.map((q,i) => {
    const status = getStatus(q.id);
    let cls = '';
    let badge = '';
    if (status === 'correct') { cls = 'done'; badge = '✓'; }
    if (status === 'wrong') { cls = 'wrong'; badge = '✗'; }
    const typeNames = {single:'单选',multiple:'多选',truefalse:'判断'};
    const typeCls = q.type;
    return `<div class="q-card ${cls}" onclick="startSingleQuiz('${q.id}')">
      <span class="q-num">#${i+1}</span>
      <span class="q-type ${typeCls}">${typeNames[q.type]}</span>
      <div class="q-text">${q.question}</div>
      ${badge ? `<div class="q-badge">${badge}</div>` : ''}
    </div>`;
  }).join('');

  // Update stats
  const total = QUESTIONS.length;
  const done = QUESTIONS.filter(q => getStatus(q.id)).length;
  const correct = QUESTIONS.filter(q => getStatus(q.id) === 'correct').length;
  const rate = done > 0 ? Math.round(correct / done * 100) : 0;
  document.getElementById('total-count').textContent = total;
  document.getElementById('done-count').textContent = done;
  document.getElementById('rate-display').textContent = rate + '%';
}

// ===== SINGLE QUESTION QUIZ (from learn page) =====
function startSingleQuiz(qid) {
  showPage('quiz');
  quizMode = 'single';
  const idx = QUESTIONS.findIndex(q => q.id === qid);
  quizQuestions = QUESTIONS.slice();
  quizIndex = idx >= 0 ? idx : 0;
  quizScore = 0;
  renderQuizQuestion();
  document.getElementById('quiz-start').style.display = 'none';
  document.getElementById('quiz-active').style.display = 'block';
  document.getElementById('quiz-complete').style.display = 'none';
}

// ===== QUIZ MODE =====
function startQuiz(mode) {
  quizMode = mode;
  if (mode === 'all') {
    // Shuffle
    quizQuestions = QUESTIONS.slice().sort(() => Math.random() - 0.5);
  } else if (mode === 'wrong') {
    quizQuestions = QUESTIONS.filter(q => getStatus(q.id) === 'wrong');
    if (quizQuestions.length === 0) {
      alert('没有错题，太棒了！');
      return;
    }
  } else if (mode === 'undone') {
    quizQuestions = QUESTIONS.filter(q => !getStatus(q.id));
    if (quizQuestions.length === 0) {
      alert('所有题目都已完成！');
      return;
    }
  }
  quizIndex = 0;
  quizScore = 0;
  document.getElementById('quiz-start').style.display = 'none';
  document.getElementById('quiz-active').style.display = 'block';
  document.getElementById('quiz-complete').style.display = 'none';
  renderQuizQuestion();
}

function resetQuiz() {
  document.getElementById('quiz-start').style.display = 'block';
  document.getElementById('quiz-active').style.display = 'none';
  document.getElementById('quiz-complete').style.display = 'none';
  quizQuestions = [];
  quizIndex = 0;
  quizScore = 0;
}

function endQuiz() {
  const total = quizQuestions.length;
  if (total === 0 || quizIndex >= total) {
    showCompletion();
  } else {
    if (confirm('确定要结束答题吗？已完成 ' + quizIndex + '/' + total + ' 题')) {
      showCompletion();
    }
  }
}

function showCompletion() {
  document.getElementById('quiz-start').style.display = 'none';
  document.getElementById('quiz-active').style.display = 'none';
  document.getElementById('quiz-complete').style.display = 'block';
  const total = quizQuestions.length;
  const rate = total > 0 ? Math.round(quizScore / total * 100) : 0;
  document.getElementById('completion-score').textContent = rate + '%';
  document.getElementById('completion-detail').textContent = `共 ${total} 题，答对 ${quizScore} 题，答错 ${total - quizScore - (total - quizIndex)} 题`;
}

function renderQuizQuestion() {
  if (quizIndex >= quizQuestions.length) {
    showCompletion();
    return;
  }
  const q = quizQuestions[quizIndex];
  quizSubmitted = false;
  quizSelected = new Set();
  document.getElementById('result-banner').className = 'result-banner';
  document.getElementById('btn-action').textContent = '提交答案';
  document.getElementById('btn-action').style.display = '';
  document.getElementById('btn-action').disabled = false;
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('btn-prev').disabled = (quizIndex === 0);

  const progress = Math.round((quizIndex) / quizQuestions.length * 100);
  document.getElementById('progress-fill').style.width = progress + '%';
  document.getElementById('progress-text').textContent = (quizIndex + 1) + '/' + quizQuestions.length;

  const typeNames = {single:'单选题',multiple:'多选题',truefalse:'判断题'};
  const typeLbl = document.getElementById('quiz-type-label');
  typeLbl.textContent = typeNames[q.type];
  typeLbl.className = 'quiz-type ' + q.type;

  document.getElementById('quiz-question').textContent = q.question;

  const optsDiv = document.getElementById('quiz-options');
  const labels = ['A','B','C','D','E','F'];
  // Shuffle options and build label mapping
  const shuffled = shuffle(q.options.map((o, i) => ({ ...o, origLabel: labels[i] })));
  quizLabelMap = {};
  quizRevLabelMap = {};
  optsDiv.innerHTML = shuffled.map((o, i) => {
    const displayLabel = labels[i];
    quizLabelMap[displayLabel] = o.origLabel;
    quizRevLabelMap[o.origLabel] = displayLabel;
    return `
    <div class="quiz-option" data-label="${displayLabel}" onclick="selectOption('${displayLabel}')">
      <span class="opt-label">${displayLabel}</span>
      <span>${o.text}</span>
    </div>`;
  }).join('');

  document.getElementById('result-banner').style.display = 'none';
}

function selectOption(label) {
  if (quizSubmitted) return;
  const q = quizQuestions[quizIndex];

  if (q.type === 'single' || q.type === 'truefalse') {
    quizSelected = new Set([label]);
    document.querySelectorAll('.quiz-option').forEach(el => {
      el.classList.toggle('selected', el.dataset.label === label);
    });
  } else {
    // Multiple choice - toggle
    if (quizSelected.has(label)) {
      quizSelected.delete(label);
    } else {
      quizSelected.add(label);
    }
    document.querySelectorAll('.quiz-option').forEach(el => {
      el.classList.toggle('selected', quizSelected.has(el.dataset.label));
    });
  }

  // Enable submit if something is selected
  document.getElementById('btn-action').disabled = quizSelected.size === 0;
}

function submitAnswer() {
  if (quizSelected.size === 0) return;

  const q = quizQuestions[quizIndex];
  quizSubmitted = true;

  const userAnswer = Array.from(quizSelected).map(l => quizLabelMap[l]).sort().join(',');
  const correctAnswer = q.answer.replace(/\s/g, '');
  const correctDisplay = correctAnswer.split(',').map(l => quizRevLabelMap[l]).sort().join(',');

  const isCorrect = userAnswer === correctAnswer;

  if (isCorrect) {
    quizScore++;
    setStatus(q.id, 'correct');
    document.getElementById('result-banner').className = 'result-banner correct';
    document.getElementById('result-text').textContent = '✓ 回答正确！';
  } else {
    setStatus(q.id, 'wrong');
    document.getElementById('result-banner').className = 'result-banner wrong';
    document.getElementById('result-text').textContent = '✗ 回答错误！正确答案：' + correctDisplay;
  }

  let explainText = '';
  if (q.source) explainText += '来源：' + q.source;
  if (q.explanation) explainText += (explainText ? '\n' : '') + q.explanation;
  document.getElementById('result-explain').textContent = explainText;
  document.getElementById('result-banner').style.display = 'block';

  // Highlight options
  const correctLabels = correctDisplay.split(',');
  document.querySelectorAll('.quiz-option').forEach(el => {
    if (correctLabels.includes(el.dataset.label)) {
      el.classList.add('correct');
    } else if (quizSelected.has(el.dataset.label) && !correctLabels.includes(el.dataset.label)) {
      el.classList.add('wrong');
    }
  });

  document.getElementById('btn-action').style.display = 'none';
  document.getElementById('btn-next').style.display = '';
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex >= quizQuestions.length) {
    showCompletion();
  } else {
    renderQuizQuestion();
    document.getElementById('quiz-active').scrollIntoView({behavior:'smooth',block:'start'});
  }
}

function prevQuestion() {
  if (quizIndex > 0) {
    quizIndex--;
    renderQuizQuestion();
  }
}

// ===== REVIEW PAGE =====
function renderReview() {
  const correct = QUESTIONS.filter(q => getStatus(q.id) === 'correct').length;
  const wrong = QUESTIONS.filter(q => getStatus(q.id) === 'wrong').length;
  const undone = QUESTIONS.filter(q => !getStatus(q.id)).length;
  document.getElementById('review-correct').textContent = correct;
  document.getElementById('review-wrong').textContent = wrong;
  document.getElementById('review-undone').textContent = undone;

  const list = document.getElementById('review-list');
  // Show wrong ones first, then correct, then undone
  const order = [...QUESTIONS].sort((a,b) => {
    const sa = getStatus(a.id);
    const sb = getStatus(b.id);
    if (sa === 'wrong' && sb !== 'wrong') return -1;
    if (sa !== 'wrong' && sb === 'wrong') return 1;
    if (sa === 'correct' && sb !== 'correct') return -1;
    if (sa !== 'correct' && sb === 'correct') return 1;
    return 0;
  });

  list.innerHTML = order.map((q,i) => {
    const status = getStatus(q.id);
    let icon = '⬜';
    let cls = '';
    if (status === 'correct') { icon = '✅'; cls = 'done'; }
    if (status === 'wrong') { icon = '❌'; cls = 'wrong'; }
    return `<div class="review-item ${cls}" onclick="startSingleQuiz('${q.id}')">
      <span class="r-status">${icon}</span>
      <span style="color:var(--text3);font-size:12px;">#${i+1}</span>
      <span style="font-size:14px;"> ${q.question.substring(0,50)}...</span>
    </div>`;
  }).join('');
}

function resetAllProgress() {
  if (confirm('确定要清除所有答题记录吗？此操作不可撤销。')) {
    progress = {};
    saveProgress();
    renderLearn();
    renderReview();
  }
}

// ===== INIT =====
renderLearn();
</script>
